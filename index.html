<!DOCTYPE html>
<html>
<head>
<title>Mi IA</title>
<style>
body{
font-family: Arial;
background:#111;
color:white;
}

#chat{
height:300px;
overflow:auto;
border:1px solid gray;
padding:10px;
}

input{
width:80%;
}

button{
width:18%;
}
</style>
</head>

<body>

<h2>Mi IA</h2>

<div id="chat"></div>

<input id="input" placeholder="Escribe algo">
<button onclick="enviar()">Enviar</button>

<script>

let memoria = JSON.parse(localStorage.getItem("memoria")) || {}

function enviar(){

let texto = document.getElementById("input").value

agregar("Tú: " + texto)

if(memoria[texto]){

responder(memoria[texto])

}else{

let r = prompt("No sé responder. ¿Qué debería decir?")

memoria[texto] = r

localStorage.setItem("memoria", JSON.stringify(memoria))

responder(r)

}

document.getElementById("input").value=""

}

function responder(t){

agregar("IA: " + t)

}

function agregar(t){

let chat = document.getElementById("chat")

chat.innerHTML += "<p>"+t+"</p>"

chat.scrollTop = chat.scrollHeight

}

</script>

</body>
</html>
